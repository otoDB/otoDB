name: CI for Backend

on:
  push:
    paths:
      - "backend/**"

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uvx ruff format --check
      - run: uvx ruff check

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.db-name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
        db-backend: [sqlite, postgres]
        postgres-version: ["17", "18"]
        exclude:
          - db-backend: sqlite
            postgres-version: "18"
        include:
          - db-backend: sqlite
            postgres-version: "17"
            db-name: SQLite
          - db-backend: postgres
            postgres-version: "17"
            db-name: PostgreSQL 17
          - db-backend: postgres
            postgres-version: "18"
            db-name: PostgreSQL 18
    services:
      postgres:
        image: ${{ matrix.db-backend == 'postgres' && format('postgres:{0}', matrix.postgres-version) || '' }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: otodb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync
      - name: Copy .env.example to .env
        run: cp .env.example .env
      - name: Run setup script (migrations + create admin)
        run: uv run _setup.py
        env:
          OTODB_SECRET_KEY: test-secret-key-for-ci
          OTODB_DB_BACKEND: ${{ matrix.db-backend }}
          OTODB_DB_HOST: ${{ matrix.db-backend == 'postgres' && 'localhost' || '' }}
          OTODB_DB_PORT: ${{ matrix.db-backend == 'postgres' && '5432' || '' }}
          OTODB_DB_NAME: ${{ matrix.db-backend == 'postgres' && 'otodb_test' || '' }}
          OTODB_DB_USER: ${{ matrix.db-backend == 'postgres' && 'postgres' || '' }}
          OTODB_DB_PASSWORD: ${{ matrix.db-backend == 'postgres' && 'postgres' || '' }}
      - name: Run Django tests
        run: uv run python manage.py test
        env:
          OTODB_SECRET_KEY: test-secret-key-for-ci
          OTODB_DB_BACKEND: ${{ matrix.db-backend }}
          OTODB_DB_HOST: ${{ matrix.db-backend == 'postgres' && 'localhost' || '' }}
          OTODB_DB_PORT: ${{ matrix.db-backend == 'postgres' && '5432' || '' }}
          OTODB_DB_NAME: ${{ matrix.db-backend == 'postgres' && 'otodb_test' || '' }}
          OTODB_DB_USER: ${{ matrix.db-backend == 'postgres' && 'postgres' || '' }}
          OTODB_DB_PASSWORD: ${{ matrix.db-backend == 'postgres' && 'postgres' || '' }}
      - name: Check server can start
        run: timeout 10 uv run python manage.py runserver || code=$?; if [[ $code -ne 124 && $code -ne 0 ]]; then exit $code; fi
        env:
          OTODB_SECRET_KEY: test-secret-key-for-ci
          OTODB_DB_BACKEND: ${{ matrix.db-backend }}
          OTODB_DB_HOST: ${{ matrix.db-backend == 'postgres' && 'localhost' || '' }}
          OTODB_DB_PORT: ${{ matrix.db-backend == 'postgres' && '5432' || '' }}
          OTODB_DB_NAME: ${{ matrix.db-backend == 'postgres' && 'otodb_test' || '' }}
          OTODB_DB_USER: ${{ matrix.db-backend == 'postgres' && 'postgres' || '' }}
          OTODB_DB_PASSWORD: ${{ matrix.db-backend == 'postgres' && 'postgres' || '' }}

  build_docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # - uses: hadolint/hadolint-action@v3.1.0
      #   with:
      #     dockerfile: web/Dockerfile
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          push: false
          context: backend
          file: backend/Dockerfile
