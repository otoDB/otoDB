# On every commit to master, build and push Docker images to the GitHub
# Container Registry.
#
# The resulting images are tagged with the full commit hash, the git branch
# name, and the git tag. The 'latest' tag always points to the latest master.
#
# https://github.com/orgs/otoDB/packages
#
# https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry
# https://docs.github.com/en/packages/managing-github-packages-using-github-actions-workflows/publishing-and-installing-a-package-with-github-actions
# https://docs.github.com/en/actions/guides/publishing-docker-images

name: Docker Build

# https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  packages: write

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [worker.oci]
            max-parallelism = 2

      # https://github.com/docker/login-action
      - name: Login to Github Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      # https://github.com/docker/metadata-action
      - name: Generate backend Docker tags
        uses: docker/metadata-action@v6
        id: backend-metadata
        with:
          images: ghcr.io/otodb/otodb-backend
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=branch
            type=ref,event=tag
          flavor: |
            latest=true

      # https://github.com/docker/build-push-action
      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: ./backend
          file: ./backend/Dockerfile
          tags: ${{ steps.backend-metadata.outputs.tags }}
          labels: ${{ steps.backend-metadata.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=registry,ref=ghcr.io/otodb/otodb-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/otodb/otodb-backend:buildcache,mode=max

      # https://github.com/docker/metadata-action
      - name: Generate frontend Docker tags
        uses: docker/metadata-action@v6
        id: frontend-metadata
        with:
          images: ghcr.io/otodb/otodb-frontend
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=branch
            type=ref,event=tag
          flavor: |
            latest=true

      # https://github.com/docker/build-push-action
      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          push: true
          context: ./frontend
          file: ./frontend/Dockerfile
          tags: ${{ steps.frontend-metadata.outputs.tags }}
          labels: ${{ steps.frontend-metadata.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=registry,ref=ghcr.io/otodb/otodb-frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/otodb/otodb-frontend:buildcache,mode=max
          build-args: |
            OTODB_HASH=${{ github.sha }}
