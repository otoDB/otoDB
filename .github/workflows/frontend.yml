name: CI for Frontend

on:
  push:
    paths:
      - "frontend/**"

defaults:
  run:
    working-directory: frontend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: bun install --frozen-lockfile
      - run: bunx prettier --check .
      - run: bunx eslint .
      - run: bun run test

