name: CI for Frontend

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

defaults:
  run:
    working-directory: frontend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - run: bun install --frozen-lockfile
      - run: bunx prettier --check .
      - run: bunx eslint .
      - name: Compile Paraglide project
        run: bunx @inlang/paraglide-js compile --project ./project.inlang --outdir ./src/lib/paraglide
      - name: Copy dotenv file to generate type-safe environment variables
        run: cp .env.example .env
      - run: bun run check
      - run: bun run test

  build_docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs:
      - test
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
      - uses: docker/metadata-action@v6
        id: frontend-metadata
        with:
          images: ghcr.io/otodb/otodb-frontend
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=branch
            type=ref,event=tag
          flavor: |
            latest=true
      - name: ${{ github.ref == 'refs/heads/master' && 'Build and publish image' || 'Only build image' }}
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.ref == 'refs/heads/master' }}
          context: frontend
          file: frontend/Dockerfile
          tags: ${{ steps.frontend-metadata.outputs.tags }}
          labels: ${{ steps.frontend-metadata.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=registry,ref=ghcr.io/otodb/otodb-frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/otodb/otodb-frontend:buildcache,mode=max
          build-args: |
            OTODB_HASH=${{ github.sha }}
