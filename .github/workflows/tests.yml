name: Tests

on:
  - push
  - pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      OTODB_DEBUG: True
      OTODB_DEBUG_TOOLBAR: False
      OTODB_TIME_ZONE: UTC
      OTODB_ALLOWED_HOSTS: localhost, 127.0.0.1
      OTODB_INTERNAL_IPS: 127.0.0.1
      OTODB_CONF_SITE_NAME: otoDB
    strategy:
      max-parallel: 4
      matrix:
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        run: |
          python manage.py test
