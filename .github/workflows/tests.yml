name: Tests

on:
  - push
  - pull_request

env:
  OTODB_DEBUG: False
  OTODB_SECRET_KEY: 114514
  OTODB_TIME_ZONE: UTC
  OTODB_ALLOWED_HOSTS: localhost, 127.0.0.1
  OTODB_INTERNAL_IPS: 127.0.0.1
  OTODB_CONF_SITE_NAME: otoDB
  OTODB_DB_NAME: otodb
  OTODB_DB_USER: db_admin
  OTODB_DB_PASSWORD: db_password
  OTODB_DB_HOST: 127.0.0.1
  DJANGO_SUPERUSER_PASSWORD: admin
  DJANGO_SUPERUSER_USERNAME: admin
  DJANGO_SUPERUSER_EMAIL: admin@otodb.net

jobs:
  test_sqlite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      OTODB_DB_BACKEND: sqlite3
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache venv
        uses: actions/cache@v4
        with:
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          path: .venv
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install psycopg2
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
      - name: Run tests
        run: |
          test -f ./otodb/migrations/0001_initial.py || \
          (python manage.py makemigrations && \
          python manage.py migrate && \
          python manage.py loaddata otodb/fixtures/otodb/category.yaml && \
          python manage.py createsuperuser --noinput)
          python manage.py test --noinput --parallel

  test_postgres:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: db_admin
          POSTGRES_PASSWORD: db_password
          POSTGRES_DB: otodb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      OTODB_DB_BACKEND: postgresql
      OTODB_DB_PORT: 5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache venv
        uses: actions/cache@v4
        with:
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          path: .venv
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          pip install psycopg2
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
      - name: Run tests
        run: |
          test -f ./otodb/migrations/0001_initial.py || \
          (python manage.py makemigrations && \
          python manage.py migrate && \
          python manage.py loaddata otodb/fixtures/otodb/category.yaml && \
          python manage.py createsuperuser --noinput)
          python manage.py test --noinput --parallel
