name: Tests

on:
  - push
  - pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        db:
          - sqlite
          - postgresql
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
        include:
          - db: postgresql
            db_port: 5432

    env:
      OTODB_DEBUG: False
      OTODB_TIME_ZONE: UTC
      OTODB_ALLOWED_HOSTS: localhost, 127.0.0.1
      OTODB_INTERNAL_IPS: 127.0.0.1
      OTODB_CONF_SITE_NAME: otoDB
      OTODB_DB_BACKEND: ${{ matrix.db }}
      OTODB_DB_NAME: otodb
      OTODB_DB_USER: postgres
      OTODB_DB_PASSWORD: postgres
      OTODB_DB_HOST: 127.0.0.1
      OTODB_DB_PORT: ${{ matrix.db_port }}

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: otodb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          : # Only make and run migrations if they don't exist
          test -d ./otodb/migrations || python manage.py makemigrations \
          python manage.py migrate \
          python manage.py loaddata otodb/fixtures/otodb/category.yaml \
          python manage.py createsuperuser --noinput
          : # Run Django tests
          python manage.py test
