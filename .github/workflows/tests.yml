name: Tests

on:
  - push
  - pull_request

env:
  OTODB_DEBUG: False
  OTODB_SECRET_KEY: 114514
  OTODB_TIME_ZONE: UTC
  OTODB_ALLOWED_HOSTS: localhost, 127.0.0.1
  OTODB_INTERNAL_IPS: 127.0.0.1
  OTODB_CONF_SITE_NAME: otoDB
  OTODB_DB_NAME: otodb
  OTODB_DB_USER: db_admin
  OTODB_DB_PASSWORD: db_password
  OTODB_DB_HOST: 127.0.0.1
  DJANGO_SUPERUSER_PASSWORD: admin
  DJANGO_SUPERUSER_USERNAME: admin
  DJANGO_SUPERUSER_EMAIL: admin@otodb.net

jobs:
  test_sqlite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
    env:
      OTODB_DB_BACKEND: sqlite3
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          test -f ./otodb/migrations/0001_initial.py || (python manage.py makemigrations && python manage.py migrate && python manage.py loaddata otodb/fixtures/otodb/category.yaml && python manage.py createsuperuser --noinput)
          python manage.py test

  test_postgres:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: db_admin
          POSTGRES_PASSWORD: db_password
          POSTGRES_DB: otodb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      OTODB_DB_BACKEND: postgresql
      OTODB_DB_PORT: 5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2
      - name: Run tests
        run: |
          test -f ./otodb/migrations/0001_initial.py || (python manage.py makemigrations && python manage.py migrate && python manage.py loaddata otodb/fixtures/otodb/category.yaml && python manage.py createsuperuser --noinput)
          python manage.py test
