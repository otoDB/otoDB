{% load static %}

<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<title>{% block page_title %}{% endblock page_title %} | {{ config.site_name }}</title>
		<meta name="referrer" content="same-origin">
		<meta name="description" content="{% block meta_description %}{% endblock meta_description %}">
		<meta name="og:site_name" content="{{ config.site_name }}">
		<link rel="stylesheet" href="{% static 'style.css' %}">
		{% block extra-css %}{% endblock extra-css %}
	</head>
	<body>
		 <nav>
		   <a href="{% url 'otodb:upload_cookies' %}">Upload Cookies</a>
		 </nav>
		<main>
		  {% block content %}{% endblock content %}
		</main>
		{% block extra-js %}{% endblock extra-js %}
	</body>
</html>
