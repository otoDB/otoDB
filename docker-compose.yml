version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${OTODB_DB_NAME}
      POSTGRES_USER: ${OTODB_DB_USER}
      POSTGRES_PASSWORD: ${OTODB_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: ./backend
    command: >
      sh -c "python _setup.py &&
      python manage.py collectstatic --noinput &&
      python manage.py runserver 0.0.0.0:8000"
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      OTODB_DB_BACKEND: postgresql
      OTODB_DB_HOST: db
      OTODB_DB_PORT: "5432"
    volumes:
      - ./backend:/app
    working_dir: /app
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
