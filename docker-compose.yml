version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${OTODB_DB_NAME}
      POSTGRES_USER: ${OTODB_DB_USER}
      POSTGRES_PASSWORD: ${OTODB_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      OTODB_DB_BACKEND: postgresql
      OTODB_DB_HOST: db
      OTODB_DB_PORT: "5432"
    volumes:
      - ./backend:/app
      - /mnt/otodb-block/static:/app/static  # Mount to specific location
    working_dir: /app
    depends_on:
      - db
    restart: always
    stop_signal: SIGINT

  frontend:
    build:
      context: ./frontend
      args:
        OTODB_FRONTEND_DOMAIN: ${OTODB_FRONTEND_DOMAIN}
    environment:
      - OTODB_FRONTEND_DOMAIN=${OTODB_FRONTEND_DOMAIN}
    restart: always

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - /mnt/otodb-block/static:/srv/static
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
