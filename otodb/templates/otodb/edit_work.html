{% extends "otodb/base.html" %}
{% block page_title %}Editing {{ work.title }}{% endblock page_title %}

{% block content %}
  <h1>Editing work: "{{ work.title }}"</h1>
  <form name="edit_work" target="_self" method="post">
    {% csrf_token %}
    <table>
        {{ form }}
    </table>
    <input type="submit"/>
  </form>
{% endblock content %}
