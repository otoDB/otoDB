{% extends "otodb/base.html" %}
{% block page_title %}{{user.username}}'s lists{% endblock page_title %}

{% block content %}
    <h1>{{user.username}}'s lists</h1>
    <a href="{% url 'otodb:new_list' %}">Make a new list</a>
    <ul>
    {% for entry in lists %}
	    <li><a href="{% url 'otodb:list' entry.id %}">{{ entry.name }}</a></li>
	{% empty %}
	    <li>No lists!</li>
    {% endfor %}
	</ul>
{% endblock content %}
