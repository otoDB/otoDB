<table>
    {% for song in results %}
        <tr>
            <td><a href="{% url 'otodb:song' song.id %}">{{ song }}</a></td>
            <td><button type="button" @click="query_action({
                id: {{ song.id }},
                title: `{{ song.title }}`,
                bpm: `{{ song.bpm }}`,
                author: `{{ song.author }}`
            })">Select</button></td>
        </tr>
    {% empty %}
        <tr><td>No songs found!</td></tr>
    {% endfor %}
    </table>
