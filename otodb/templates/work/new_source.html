{% extends "base.html" %}
{% block page_title %}Adding source for {{work.title}}{% endblock page_title %}

{% block content %}
<h1>New source for "{{ work.title }}"</h1>
<p>Currently accepted sites:</p>
<ul>
  <li>YouTube</li>
  <li>Niconico</li>
  <li>Bilibili</li>
  <li>SoundCloud</li>
</ul>
<form name="new_source" target="_self" method="post">
  {% csrf_token %}
  <table>
    {{ form }}
    </table>
  <input type="submit"/>
</form>
  
{% endblock content %}
